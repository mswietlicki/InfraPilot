name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore InfraPilot.slnx

      - name: Build
        run: dotnet build InfraPilot.slnx -c Release --no-restore

      - name: Test
        run: dotnet test InfraPilot.slnx -c Release --no-build --verbosity normal

  validate-image-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false

  validate-site-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install site dependencies
        working-directory: docs
        run: npm ci

      - name: Build site
        working-directory: docs
        env:
          PAGES_BASE_PATH: /infraPilot/
        run: npm run build
