name: Release Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release (e.g. v1.0.25)
        type: string
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        run: echo "value=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: image-name
        run: echo "value=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: image-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.value }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest

      - name: Build and push app image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.value }}

      - name: Create or update GitHub release notes
        uses: actions/github-script@v7
        env:
          IMAGE_NAME: ${{ steps.image-name.outputs.value }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          IMAGE_DIGEST: ${{ steps.build-image.outputs.digest }}
        with:
          script: |
            const tag = process.env.IMAGE_TAG;
            const body = [
              '## Container image',
              '',
              `- Tag: \`${process.env.IMAGE_NAME}:${process.env.IMAGE_TAG}\``,
              `- Latest: \`${process.env.IMAGE_NAME}:latest\``,
              `- Digest: \`${process.env.IMAGE_NAME}@${process.env.IMAGE_DIGEST}\``,
            ].join('\n');

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: existing.data.name || tag,
                body,
              });
            } catch (error) {
              if (error.status !== 404) throw error;

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body,
              });
            }
