name: Release

# Two entry points:
#  • Automatic — after the CI workflow succeeds on main (every merge). Bumps the patch version.
#  • Manual   — workflow_dispatch, to cut a minor/major (or an explicit patch) release on demand.
# In both cases the tag job computes and pushes the next vX.Y.Z tag, then hands off to
# release-image.yml (via workflow_call) to build and publish the container image. The image build
# is invoked directly rather than relying on the tag push, because a tag pushed with GITHUB_TOKEN
# does not itself trigger further workflows.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of the version to bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  packages: write

# Serialize releases so two closely-spaced merges can't compute the same next version and collide
# on the tag push.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    # Manual dispatch always runs; the automatic path only when CI actually succeeded on main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # For the automatic path, tag the exact commit CI validated; for manual, the dispatched ref.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Compute next version and push tag
        id: bump
        env:
          # Automatic releases are always a patch bump; manual dispatch picks the part.
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          echo "Latest tag: $latest"

          ver=${latest#v}
          IFS='.' read -r major minor patch <<< "$ver"

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "Next tag: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "Release $next"
          git push origin "$next"

  release:
    needs: tag
    uses: ./.github/workflows/release-image.yml
    with:
      tag: ${{ needs.tag.outputs.version }}
    secrets: inherit
